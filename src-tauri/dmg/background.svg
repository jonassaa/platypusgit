<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <!--
    PlatypusGit DMG installer background — classic "drag to Applications" layout,
    styled to match the marketing site's dark mode (site/src/styles/tokens.css).
    Palette (oklch tokens → sRGB): bg-0 #0d1013, bg-1 #131519, border-1 #33353a,
    fg-1 #c2c4c7, fg-2 #8c8f94, accent teal #4daa9f.

    Finder paints the real .app icon at appPosition (178,190) and the Applications
    alias at applicationFolderPosition (482,190), both 128px, on top of this image.
    Keep those two spots clear. The arrow bridges them.
    Regenerate PNG:  inkscape background.svg -o background.png -w 1320 -h 800
                     sips -s dpiWidth 144 -s dpiHeight 144 background.png
  -->
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12151a"/>
      <stop offset="0.55" stop-color="#0d1013"/>
      <stop offset="1" stop-color="#0b0e11"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.48" r="0.42">
      <stop offset="0" stop-color="#4daa9f" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#4daa9f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4daa9f" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4daa9f"/>
    </linearGradient>
  </defs>

  <!-- site-dark ground with a whisper of depth -->
  <rect x="0" y="0" width="660" height="400" fill="url(#ground)"/>
  <ellipse cx="330" cy="192" rx="300" ry="150" fill="url(#glow)"/>
  <!-- hairline top separator, like the site's chrome -->
  <rect x="0" y="0" width="660" height="1" fill="#33353a" opacity="0.5"/>

  <!-- ===== drag arrow: app icon (left) → Applications (right) ===== -->
  <g>
    <!-- soft glow under the arrow -->
    <path d="M 262 190 H 392" fill="none" stroke="#4daa9f" stroke-width="18" stroke-linecap="round" opacity="0.12"/>
    <!-- shaft -->
    <path d="M 262 190 H 388" fill="none" stroke="url(#arrow)" stroke-width="8" stroke-linecap="round"/>
    <!-- head -->
    <path d="M 380 174 L 408 190 L 380 206 Z" fill="#4daa9f"/>
  </g>

  <!-- instruction -->
  <text x="330" y="332" text-anchor="middle"
        font-family="'JetBrains Mono','SF Mono',Menlo,ui-monospace,monospace"
        font-size="13" letter-spacing="0.5" fill="#8c8f94">drag PlatypusGit onto Applications</text>
</svg>
