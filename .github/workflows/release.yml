name: release

# Releases are cut by PUBLISHING a GitHub Release: draft it in the UI, pick the
# vX.Y.Z tag (GitHub creates the tag on publish), then publish when you're sure
# it's good. Publishing triggers this workflow, which builds per-platform bundles
# and attaches them to that same release:
#   - macOS  universal .dmg   (PlatypusGit_universal.dmg)
#   - Windows x64 .msi         (PlatypusGit_x64.msi)
#   - Linux  amd64 .deb + .AppImage (PlatypusGit_amd64.deb / .AppImage)
#
# Nothing releases on a plain push to main — you control when "latest" moves by
# choosing when to publish. Mark a release as a "prerelease" to build + attach
# assets WITHOUT moving Homebrew's releases/latest pointer; flip prerelease off
# later to promote it to latest (no rebuild needed).
#
# Version is taken from the release tag (v0.0.4 -> 0.0.4) and injected into the
# app manifests at build time. The .dmg is published under a STABLE filename so
# the Homebrew cask can track releases/latest/download.
#
# The app is ad-hoc signed (tauri.conf.json -> macOS.signingIdentity "-") but
# NOT notarized — the Homebrew cask strips the Gatekeeper quarantine flag.

on:
  release:
    # A non-prerelease publish fires BOTH `published` and `released`, so we
    # subscribe to both but gate the `version` job (below) to run only on
    # `published` — that dedups the two events into a single build+bump run.
    # `released` still starts a run, but every job skips (all chain off
    # `version`), so a direct full-release publish builds exactly once.
    #
    # Promoting a prerelease to a full release later fires `released` only
    # (not `published`); under this gate that run is a no-op, so promotion
    # does NOT auto-bump the cask — bump it with a `workflow_dispatch` against
    # the tag (see the bump-cask job).
    types: [published, released]
  workflow_dispatch: # re-run a build against an existing release tag
    inputs:
      tag:
        description: 'Existing release tag to (re)build, e.g. v0.0.4'
        required: true

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    # Skip the redundant `released` run on a direct full-release publish (which
    # also fires `published`). Every other job chains off `version`, so this one
    # gate collapses the double-trigger into a single build+bump.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.action == 'published' }}
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve version from release tag
        id: resolve
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          if [ -z "$tag" ]; then
            echo "No release tag available" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "Tag: $tag  Version: $version"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  macos-universal:
    needs: version
    runs-on: macos-14
    outputs:
      sha256: ${{ steps.sha.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Inject version ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          v="${{ needs.version.outputs.version }}"
          tmp="$(mktemp)"
          jq --arg v "$v" '.version = $v' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json
          jq --arg v "$v" '.version = $v' package.json > "$tmp" && mv "$tmp" package.json
          sed -i '' -E "s/^version = \".*\"/version = \"$v\"/" src-tauri/Cargo.toml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build universal app
        run: pnpm tauri build --target universal-apple-darwin

      - name: Rename dmg to stable name
        run: |
          set -euo pipefail
          src_dir="src-tauri/target/universal-apple-darwin/release/bundle/dmg"
          dmg="$(ls "$src_dir"/*.dmg | head -n1)"
          cp "$dmg" "$src_dir/PlatypusGit_universal.dmg"

      - name: Compute .dmg sha256
        id: sha
        run: |
          set -euo pipefail
          f="src-tauri/target/universal-apple-darwin/release/bundle/dmg/PlatypusGit_universal.dmg"
          sum="$(shasum -a 256 "$f" | awk '{print $1}')"
          echo "sha256: $sum"
          echo "sha256=$sum" >> "$GITHUB_OUTPUT"

      - name: Attach .dmg to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: src-tauri/target/universal-apple-darwin/release/bundle/dmg/PlatypusGit_universal.dmg
          fail_on_unmatched_files: true

  windows:
    needs: version
    runs-on: windows-latest
    outputs:
      sig: ${{ steps.sig.outputs.sig }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Inject version ${{ needs.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          v="${{ needs.version.outputs.version }}"
          tmp="$(mktemp)"
          jq --arg v "$v" '.version = $v' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json
          jq --arg v "$v" '.version = $v' package.json > "$tmp" && mv "$tmp" package.json
          sed -i -E "s/^version = \".*\"/version = \"$v\"/" src-tauri/Cargo.toml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Rename bundle to stable name
        shell: bash
        run: |
          set -euo pipefail
          msi_dir="src-tauri/target/release/bundle/msi"
          cp "$(ls "$msi_dir"/*.msi | head -n1)" "$msi_dir/PlatypusGit_x64.msi"

      - name: Read updater signature
        id: sig
        shell: bash
        run: |
          set -euo pipefail
          msi_dir="src-tauri/target/release/bundle/msi"
          sig="$(cat "$(ls "$msi_dir"/*.msi.sig | head -n1)")"
          echo "sig=$sig" >> "$GITHUB_OUTPUT"

      - name: Attach installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: src-tauri/target/release/bundle/msi/PlatypusGit_x64.msi
          fail_on_unmatched_files: true

  linux:
    needs: version
    runs-on: ubuntu-22.04
    outputs:
      sig: ${{ steps.sig.outputs.sig }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Install system deps
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Inject version ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          v="${{ needs.version.outputs.version }}"
          tmp="$(mktemp)"
          jq --arg v "$v" '.version = $v' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json
          jq --arg v "$v" '.version = $v' package.json > "$tmp" && mv "$tmp" package.json
          sed -i -E "s/^version = \".*\"/version = \"$v\"/" src-tauri/Cargo.toml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Rename bundles to stable names
        run: |
          set -euo pipefail
          deb_dir="src-tauri/target/release/bundle/deb"
          appimage_dir="src-tauri/target/release/bundle/appimage"
          cp "$(ls "$deb_dir"/*.deb | head -n1)" "$deb_dir/PlatypusGit_amd64.deb"
          cp "$(ls "$appimage_dir"/*.AppImage | head -n1)" "$appimage_dir/PlatypusGit_amd64.AppImage"

      - name: Read updater signature
        id: sig
        run: |
          set -euo pipefail
          appimage_dir="src-tauri/target/release/bundle/appimage"
          sig="$(cat "$(ls "$appimage_dir"/*.AppImage.sig | head -n1)")"
          echo "sig=$sig" >> "$GITHUB_OUTPUT"

      - name: Attach bundles to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: |
            src-tauri/target/release/bundle/deb/PlatypusGit_amd64.deb
            src-tauri/target/release/bundle/appimage/PlatypusGit_amd64.AppImage
          fail_on_unmatched_files: true

  # Pin the Homebrew cask to this release: rewrite version + sha256 in
  # jonassaa/homebrew-platypusgit and commit straight to that tap's main.
  #
  # Runs on: (a) a non-prerelease `published` release, and (b) a manual
  # workflow_dispatch against an explicit tag. Plain prereleases are skipped
  # so "brew install" never jumps to an unfinished build. Because `version`
  # is gated to `published`/dispatch, this job never runs on a `released`
  # event — so promoting a prerelease to a full release does NOT auto-bump;
  # bump that tag with a workflow_dispatch on demand. Requires the macOS
  # build's sha256 output (needs: macos-universal).
  #
  # Cross-repo push: GITHUB_TOKEN can't reach the tap, so we mint a short-lived
  # token from a GitHub App installed on the tap (app id in vars.TAP_APP_ID,
  # private key in secrets.TAP_APP_PRIVATE_KEY). The commit is attributed to
  # github-actions[bot].
  bump-cask:
    needs: [version, macos-universal]
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'release' && github.event.release.prerelease == false) || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Mint tap token from GitHub App
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TAP_APP_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: jonassaa
          repositories: homebrew-platypusgit

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: jonassaa/homebrew-platypusgit
          token: ${{ steps.app-token.outputs.token }}
          path: tap

      - name: Rewrite cask version + sha256
        run: |
          set -euo pipefail
          v="${{ needs.version.outputs.version }}"
          sha="${{ needs.macos-universal.outputs.sha256 }}"
          if [ -z "$sha" ]; then
            echo "Empty sha256 from macos-universal job" >&2
            exit 1
          fi
          f="tap/Casks/platypusgit.rb"
          sed -i -E "s/^  version \".*\"/  version \"$v\"/" "$f"
          sed -i -E "s/^  sha256 \".*\"/  sha256 \"$sha\"/" "$f"
          echo "--- updated cask ---"
          grep -E '^  (version|sha256|url)' "$f"

      - name: Commit & push to tap main
        run: |
          set -euo pipefail
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Cask already up to date — nothing to commit"
            exit 0
          fi
          git add Casks/platypusgit.rb
          git commit -m "chore: bump platypusgit to ${{ needs.version.outputs.version }}"
          git push

  # Publish the updater manifest so tauri-plugin-updater can verify + install.
  # Points at the stable-named release assets. macOS is intentionally omitted
  # (notify-only). Skipped for plain prereleases, same gate as bump-cask.
  updater-manifest:
    needs: [version, windows, linux]
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'release' && github.event.release.prerelease == false) || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Build latest.json
        run: |
          set -euo pipefail
          v="${{ needs.version.outputs.version }}"
          tag="${{ needs.version.outputs.tag }}"
          base="https://github.com/jonassaa/platypusgit/releases/download/${tag}"
          jq -n \
            --arg version "$v" \
            --arg notes "See https://github.com/jonassaa/platypusgit/releases/tag/${tag}" \
            --arg win_sig "${{ needs.windows.outputs.sig }}" \
            --arg win_url "${base}/PlatypusGit_x64.msi" \
            --arg lin_sig "${{ needs.linux.outputs.sig }}" \
            --arg lin_url "${base}/PlatypusGit_amd64.AppImage" \
            '{
              version: $version,
              notes: $notes,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "linux-x86_64": { signature: $lin_sig, url: $lin_url }
              }
            }' > latest.json
          echo "--- latest.json ---"
          cat latest.json

      - name: Attach latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: latest.json
          fail_on_unmatched_files: true
